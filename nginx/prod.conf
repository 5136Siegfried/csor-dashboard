# /etc/nginx/sites-available/maraude
# Lien symbolique : ln -s /etc/nginx/sites-available/maraude /etc/nginx/sites-enabled/

server {
    listen 80;
    server_name maraude.5136.fr;

    # Redirect HTTP → HTTPS (à activer après certbot)
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name maraude.5136.fr;

    # Certificat TLS (géré par certbot / Let's Encrypt)
    ssl_certificate     /etc/letsencrypt/live/maraude.5136.fr/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/maraude.5136.fr/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Sécurité headers
    add_header X-Frame-Options           SAMEORIGIN;
    add_header X-Content-Type-Options    nosniff;
    add_header Referrer-Policy           strict-origin-when-cross-origin;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains";

    # Reverse proxy vers le conteneur Docker
    location / {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }
}
