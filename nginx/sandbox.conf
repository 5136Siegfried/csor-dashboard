# /etc/nginx/sites-available/maraude-sandbox

server {
    listen 80;
    server_name demo.maraude.5136.fr;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name demo.maraude.5136.fr;

    ssl_certificate     /etc/letsencrypt/live/demo.maraude.5136.fr/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/demo.maraude.5136.fr/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;

    add_header X-Robots-Tag "noindex, nofollow";   # sandbox non indexée
    add_header X-Frame-Options SAMEORIGIN;
    add_header X-Content-Type-Options nosniff;

    location / {
        proxy_pass         http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
}
