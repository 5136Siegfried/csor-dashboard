services:
  app:
    image: ghcr.io/${GITHUB_REPOSITORY:-5136siegfried/csor-dashboard}:latest
    container_name: maraude
    restart: unless-stopped
    ports:
      - "127.0.0.1:3000:3000"   # exposé uniquement à Nginx sur localhost
    environment:
      - PORT=3000
      - JWT_SECRET=${JWT_SECRET}
      - EDITOR_PASSWORD=${EDITOR_PASSWORD}
      - DATA_FILE=/app/data/data.json
    volumes:
      - maraude_data:/app/data   # persistance des données entre déploiements

volumes:
  maraude_data:
